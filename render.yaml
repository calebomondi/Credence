services:
  # ─── Backend API ──────────────────────────────────────
  - type: web
    name: credence-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && node dist/main
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: DATABASE_URL
        value: file:/data/dev.db
      - key: STELLAR_RPC_URL
        value: https://soroban-testnet.stellar.org
      - key: STELLAR_HORIZON_URL
        value: https://horizon-testnet.stellar.org
      - key: CONTRACT_ID
        value: CB3R2DC33MS6ZUQUXDXJ24FLKPYVKDL6EDJ6HT2KPETEXPQ5TSZGFTKY
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://credence-frontend.onrender.com
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1

  # ─── Frontend ─────────────────────────────────────────
  - type: web
    name: credence-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NEXT_PUBLIC_API_URL
        value: https://credence-backend.onrender.com
      - key: NEXT_PUBLIC_CONTRACT_ID
        value: CB3R2DC33MS6ZUQUXDXJ24FLKPYVKDL6EDJ6HT2KPETEXPQ5TSZGFTKY
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
